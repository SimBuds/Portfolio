</label> </div> <div class="navbar-collapse"> <ul class="navbar-center"> <li><a href="/projectlist" class="nav-link">Projects</a></li> <li><a href="/#aboutme" class="nav-link">About</a></li> <li><a href="/resume.pdf" target="_blank" rel="noopener noreferrer" class="nav-link">Resume</a></li> <li><a href="/contact" class="nav-link">Contact</a></li> </ul> <ul class="navbar-social"> <li><a href="https://twitter.com/caseyhsuble" target="_blank" rel="noopener noreferrer" aria-label="Twitter profile"><i class="fab fa-twitter"></i></a></li> <li><a href="https://github.com/SimBuds" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile"><i class="fab fa-github"></i></a></li> <li><a href="https://www.linkedin.com/in/casey-hsu/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile"><i class="fab fa-linkedin-in"></i></a></li> </ul> </div> </nav> <div class="contact-page"> <h1>Feel free to reach out!</h1> <div id="status-messages"></div> <div class="contact-form"> <form id="contact-form"> <div class="form-group"> <label for="email">Your Email:</label> <input type="email" id="email" name="email" required placeholder="email@example.com"> <span class="error-text" id="error-email"></span> </div> <div class="form-group"> <label for="message">Your Message:</label> <textarea id="message" name="message" required placeholder="Type your message here..."></textarea> <span class="error-text" id="error-message"></span> </div> <button type="submit" class="send-button" id="send-button">Send Message</button> </form> </div> </div> <script type="module">
    const form = document.getElementById('contact-form');
    const statusEl = document.getElementById('status-messages');
    const errors = {
      email: document.getElementById('error-email'),
      message: document.getElementById('error-message'),
    };

    function validate(data) {
      const errs = {};
      if (!data.email) {
        errs.email = 'Email is required';
      } else if (!/\S+@\S+\.\S+/.test(data.email)) {
        errs.email = 'Email is invalid';
      }
      if (!data.message) {
        errs.message = 'Message is required';
      } else if (data.message.length < 10) {
        errs.message = 'Message should be at least 10 characters';
      }
      return errs;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        email: form.email.value,
        message: form.message.value,
        name: form.name ? form.name.value : '',
      };
      const errs = validate(data);
      Object.values(errors).forEach(el => (el.textContent = ''));
      if (Object.keys(errs).length) {
        Object.entries(errs).forEach(([k,v]) => {errors[k].textContent = v;});
        return;
      }
      statusEl.textContent = 'Sending...';
      try {
        const res = await fetch('https://formspree.io/f/maqdrbly', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          statusEl.textContent = "Thank you for your message! I'll get back to you soon.";
          form.reset();
        } else {
          const errorData = await res.json();
          statusEl.textContent = errorData.message || 'Failed to send message. Please try again later.';
        }
      } catch (err) {
        statusEl.textContent = 'Network error. Please check your internet connection and try again.';
      }
      setTimeout(() => statusEl.textContent = '', 5000);
    });
  </script> <footer class="footer"> <div class="footer-socials"> <a href="https://twitter.com/caseyhsuble" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter fa-lg"></i></a> <a href="https://github.com/SimBuds" target="_blank" rel="noopener noreferrer"><i class="fab fa-github fa-lg"></i></a> <a href="https://www.linkedin.com/in/casey-hsu/" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin-in fa-lg"></i></a> </div> <div class="footer-text"> <p>©2026 Casey Hsu. All rights reserved.</p> </div> </footer>
